<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiz - CyberShield</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header>
    <nav>
      <a href="index.html" class="logo">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
        </svg>
        CyberShield
      </a>
      <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="encyclopedia/index.html">Encyclopedia</a></li>
        <li><a href="quiz.html" class="active">Quiz</a></li>
        <li><a href="checklist.html">Checklist</a></li>
        <li><a href="feed.html">Feed</a></li>
        <li><a href="login.html" id="authLink">Login</a></li>
      </ul>
    </nav>
  </header>

  <main>
    <div class="page-header">
      <h1>Cybersecurity Quiz</h1>
      <p>Test your knowledge with 10 questions. You have 30 seconds per question.</p>
    </div>

    <div class="quiz-container">
      <div id="quizStart" class="card" style="text-align: center; padding: 48px;">
        <div id="authWarning" class="hidden" style="background: #fef7e0; padding: 16px; border-radius: 8px; margin-bottom: 24px;">
          <p>💡 <a href="login.html">Login</a> to save your quiz history.</p>
        </div>
        <button id="startBtn" class="btn btn-primary" style="font-size: 1.25rem; padding: 16px 48px;">Start Quiz</button>
      </div>

      <div id="quizQuestions" class="hidden">
        <div class="quiz-progress">
          <div id="progressBar" class="quiz-progress-bar" style="width: 0%;"></div>
        </div>
        <div id="timer" class="quiz-timer">30</div>
        <div class="quiz-question" id="questionText"></div>
        <div id="quizOptions" class="quiz-options"></div>
      </div>

      <div id="quizResults" class="hidden quiz-results card">
        <h2>Quiz Complete!</h2>
        <div id="passFail" class="quiz-score" style="font-size: 2rem;"></div>
        <div id="scoreText" class="quiz-score"></div>
        <button id="restartBtn" class="btn btn-primary" style="margin-top: 24px;">Take Again</button>
        
        <div id="historySection" class="hidden" style="margin-top: 48px; text-align: left;">
          <h3 style="margin-bottom: 16px;">Your History</h3>
          <div id="historyList" class="history-list"></div>
        </div>
      </div>
    </div>
  </main>

  <footer>
    <p>&copy; 2024 CyberShield. Stay safe online.</p>
  </footer>

  <script src="js/utils.js"></script>
  <script>
    window.utils = utils;
  </script>
  <script src="js/quiz.js"></script>
</body>
</html>
