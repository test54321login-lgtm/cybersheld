<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up - CyberShield</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header>
    <nav>
      <a href="index.html" class="logo">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
        </svg>
        CyberShield
      </a>
      <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="encyclopedia/index.html">Encyclopedia</a></li>
        <li><a href="quiz.html">Quiz</a></li>
        <li><a href="checklist.html">Checklist</a></li>
        <li><a href="feed.html">Feed</a></li>
        <li><a href="login.html">Login</a></li>
      </ul>
    </nav>
  </header>

  <main>
    <div class="form-container card">
      <h1 style="text-align: center; margin-bottom: 24px;">Create Account</h1>
      
      <div id="message" class="message hidden"></div>

      <form id="signupForm">
        <div class="form-group">
          <label for="signupEmail">Email</label>
          <input type="email" id="signupEmail" placeholder="your@email.com" required>
        </div>
        <div class="form-group">
          <label for="signupPassword">Password</label>
          <input type="password" id="signupPassword" placeholder="Create password (min 6 chars)" required>
        </div>
        <div class="form-group">
          <label for="signupConfirmPassword">Confirm Password</label>
          <input type="password" id="signupConfirmPassword" placeholder="Confirm password" required>
        </div>
        <button type="submit" class="btn btn-primary" style="width: 100%;">Create Account</button>
      </form>

      <p style="text-align: center; margin-top: 24px;">
        Already have an account? <a href="login.html">Login</a>
      </p>
    </div>
  </main>

  <footer>
    <p>&copy; 2024 CyberShield. Stay safe online.</p>
  </footer>

  <script src="js/utils.js"></script>
  <script>
    const { setToken, showError, showSuccess, hideMessage } = utils;

    document.addEventListener('DOMContentLoaded', () => {
      const token = localStorage.getItem('cybershield_token');
      if (token) {
        window.location.href = 'index.html';
        return;
      }

      const form = document.getElementById('signupForm');
      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        hideMessage();

        const email = document.getElementById('signupEmail').value;
        const password = document.getElementById('signupPassword').value;
        const confirmPassword = document.getElementById('signupConfirmPassword').value;

        if (!email || !password || !confirmPassword) {
          showError('Please fill in all fields');
          return;
        }

        if (password !== confirmPassword) {
          showError('Passwords do not match');
          return;
        }

        if (password.length < 6) {
          showError('Password must be at least 6 characters');
          return;
        }

        try {
          const response = await fetch('/api/auth/signup', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email, password })
          });
          
          const data = await response.json();
          
          if (!response.ok) {
            throw new Error(data.error || 'Signup failed');
          }

          setToken(data.token);
          showSuccess('Account created!');
          setTimeout(() => {
            window.location.href = 'index.html';
          }, 500);
        } catch (err) {
          showError(err.message);
        }
      });
    });
  </script>
</body>
</html>
