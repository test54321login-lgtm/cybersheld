<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - CyberShield</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header>
    <nav>
      <a href="index.html" class="logo">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
        </svg>
        CyberShield
      </a>
      <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="encyclopedia/index.html">Encyclopedia</a></li>
        <li><a href="quiz.html">Quiz</a></li>
        <li><a href="checklist.html">Checklist</a></li>
        <li><a href="feed.html">Feed</a></li>
      </ul>
    </nav>
  </header>

  <main>
    <div class="form-container card">
      <h1 style="text-align: center; margin-bottom: 24px;">Welcome</h1>
      
      <div class="tabs">
        <button id="loginTab" class="active">Login</button>
        <button id="signupTab">Sign Up</button>
      </div>

      <div id="message" class="message hidden"></div>

      <form id="loginForm">
        <div class="form-group">
          <label for="loginEmail">Email</label>
          <input type="email" id="loginEmail" placeholder="your@email.com" required>
        </div>
        <div class="form-group">
          <label for="loginPassword">Password</label>
          <input type="password" id="loginPassword" placeholder="Enter password" required>
        </div>
        <button type="submit" class="btn btn-primary" style="width: 100%;">Login</button>
      </form>

      <p style="text-align: center; margin-top: 24px;">
        Don't have an account? <a href="signup.html">Sign Up</a>
      </p>

      <form id="signupForm" class="hidden">
        <div class="form-group">
          <label for="signupEmail">Email</label>
          <input type="email" id="signupEmail" placeholder="your@email.com" required>
        </div>
        <div class="form-group">
          <label for="signupPassword">Password</label>
          <input type="password" id="signupPassword" placeholder="Create password (min 6 chars)" required>
        </div>
        <div class="form-group">
          <label for="signupConfirmPassword">Confirm Password</label>
          <input type="password" id="signupConfirmPassword" placeholder="Confirm password" required>
        </div>
        <button type="submit" class="btn btn-primary" style="width: 100%;">Create Account</button>
      </form>
    </div>
  </main>

  <footer>
    <p>&copy; 2024 CyberShield. Stay safe online.</p>
  </footer>

  <script src="js/utils.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
